<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triton ML Stance Sheet — Real Photo Wheel &amp; Offset Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --bg:#14171A;
    --panel:#1E2327;
    --panel-light:#262C31;
    --line:#343B41;
    --orange:#E8611C;
    --yellow:#F2C14E;
    --paper:#EDE9DE;
    --blue:#5B8AA6;
    --muted:#7C858C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--paper);
    font-family:'IBM Plex Sans',sans-serif;
    min-height:100vh;
    padding:24px;
  }
  .sheet{
    max-width:1180px;
    margin:0 auto;
    border:1px solid var(--line);
    background:var(--panel);
  }
  .titleblock{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:18px 24px;
    border-bottom:2px solid var(--orange);
    flex-wrap:wrap;
    gap:10px;
  }
  .titleblock h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:34px;
    letter-spacing:1.5px;
    margin:0;
    color:var(--paper);
  }
  .titleblock h1 span{color:var(--orange);}
  .titleblock .docnum{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    text-align:right;
    line-height:1.5;
  }
  .tabs{ display:flex; border-bottom:1px solid var(--line); }
  .tab{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px; letter-spacing:1px; text-transform:uppercase;
    color:var(--muted); background:none; border:none;
    padding:12px 22px; cursor:pointer;
    border-right:1px solid var(--line); border-bottom:2px solid transparent;
  }
  .tab.active{ color:var(--yellow); border-bottom:2px solid var(--orange); }
  .body-layout{ display:flex; flex-wrap:wrap; }
  .drawing-panel{
    flex:1 1 640px; padding:20px; border-right:1px solid var(--line); position:relative;
  }
  .stage{ 
    position:relative; 
    width:100%; 
    background:#0d0f11; 
    overflow:hidden; 
    border:1px solid var(--line);
  }
  .stage img{ width:100%; display:block; height:auto; }
  .stage svg{ position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  
  .view{ display:none; }
  .view.active{ display:block; }
  
  .hint{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);
    margin-top:10px; line-height:1.6;
  }
  .hint b{color:var(--yellow);}
  
  .controls-panel{
    flex:0 0 320px; padding:20px; display:flex; flex-direction:column; gap:16px;
  }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{
    font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:1.5px; color:var(--blue); display:flex; justify-content:space-between;
  }
  .field label .val{color:var(--yellow);}
  select{
    background:var(--panel-light); border:1px solid var(--line); color:var(--paper);
    font-family:'IBM Plex Sans',sans-serif; font-size:14px; padding:9px 10px;
    border-radius:2px; outline:none; cursor:pointer;
  }
  input[type=range]{ width:100%; accent-color:var(--orange); cursor:pointer; }
  select:focus{ border-color:var(--orange); }
  .divider{ height:1px; background:var(--line); margin:2px 0; }
  .resetbtn{
    font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:1px; color:var(--paper); background:var(--panel-light);
    border:1px solid var(--line); padding:9px 10px; cursor:pointer; border-radius:2px;
  }
  .resetbtn:hover{ border-color:var(--orange); color:var(--orange); }
